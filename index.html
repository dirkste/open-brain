<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Open Brain</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 24px;
    }

    #app { width: 100%; max-width: 480px; }

    textarea {
      width: 100%;
      min-height: 160px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      color: #f0f0f0;
      font-size: 1rem;
      line-height: 1.6;
      padding: 16px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #555; }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 16px;
      background: #f0f0f0;
      color: #0f0f0f;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:disabled { opacity: 0.4; cursor: default; }

    #status {
      margin-top: 12px;
      font-size: 0.875rem;
      text-align: center;
      min-height: 20px;
      color: #888;
    }

    #status.ok { color: #4ade80; }
    #status.err { color: #f87171; }

    /* Setup screen */
    #setup { display: none; width: 100%; max-width: 480px; }
    #setup p { color: #888; font-size: 0.9rem; margin-bottom: 12px; }
    #setup input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      color: #f0f0f0;
      font-size: 0.9rem;
      padding: 14px 16px;
      outline: none;
    }
    #setup input:focus { border-color: #555; }
  </style>
</head>
<body>
  <h1>open brain</h1>

  <div id="setup">
    <p>Enter your brain key to get started:</p>
    <input type="password" id="keyInput" placeholder="brain key" autocomplete="off" />
    <button id="saveKey">Save</button>
    <div id="status"></div>
  </div>

  <div id="app" style="display:none">
    <textarea id="thought" placeholder="What's on your mind?" autofocus></textarea>
    <button id="submit">Capture</button>
    <div id="status"></div>
  </div>

  <script>
    const BASE = "https://ptitndzqwctzbclborxd.supabase.co/functions/v1/open-brain-mcp";
    const ENDPOINT = BASE + "/capture";
    const HEALTH = BASE + "/health";
    const KEY_STORAGE = "brain_key";

    const setupEl = document.getElementById("setup");
    const appEl = document.getElementById("app");

    function getStatus(parent) {
      return parent.querySelector("#status");
    }

    function showApp() {
      setupEl.style.display = "none";
      appEl.style.display = "block";
      document.getElementById("thought").focus();
    }

    function showSetup() {
      appEl.style.display = "none";
      setupEl.style.display = "block";
    }

    // Boot
    if (localStorage.getItem(KEY_STORAGE)) {
      showApp();
    } else {
      showSetup();
    }

    // Save key — validate against server before storing
    const saveKeyBtn = document.getElementById("saveKey");
    const setupStatus = setupEl.querySelector("#status");

    document.getElementById("saveKey").addEventListener("click", async () => {
      const key = document.getElementById("keyInput").value.trim();
      if (!key) return;

      saveKeyBtn.disabled = true;
      setupStatus.className = "";
      setupStatus.textContent = "Checking key...";

      try {
        const res = await fetch(HEALTH, {
          headers: { "x-brain-key": key },
        });

        if (res.status === 200) {
          localStorage.setItem(KEY_STORAGE, key);
          showApp();
        } else if (res.status === 401) {
          setupStatus.className = "err";
          setupStatus.textContent = "Invalid key — try again.";
        } else {
          setupStatus.className = "err";
          setupStatus.textContent = `Unexpected error (${res.status}) — try again.`;
        }
      } catch (_err) {
        setupStatus.className = "err";
        setupStatus.textContent = "Could not reach server.";
      } finally {
        saveKeyBtn.disabled = false;
      }
    });

    // Submit thought
    const submitBtn = document.getElementById("submit");
    const thoughtEl = document.getElementById("thought");
    const statusEl = appEl.querySelector("#status");

    submitBtn.addEventListener("click", async () => {
      const content = thoughtEl.value.trim();
      if (!content) return;

      submitBtn.disabled = true;
      statusEl.className = "";
      statusEl.textContent = "Capturing...";

      try {
        const res = await fetch(ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-brain-key": localStorage.getItem(KEY_STORAGE),
          },
          body: JSON.stringify({ content }),
        });

        if (res.status === 401) {
          statusEl.className = "err";
          statusEl.textContent = "Invalid key — check your brain key in settings.";
          submitBtn.disabled = false;
          return;
        }

        if (!res.ok) {
          const { error } = await res.json().catch(() => ({}));
          throw new Error(error || `HTTP ${res.status}`);
        }

        const { metadata } = await res.json();
        const type = metadata?.type || "thought";
        const topics = metadata?.topics?.join(", ");
        statusEl.className = "ok";
        statusEl.textContent = `Captured as ${type}${topics ? " — " + topics : ""}`;
        thoughtEl.value = "";
      } catch (err) {
        statusEl.className = "err";
        statusEl.textContent = err.message;
      } finally {
        submitBtn.disabled = false;
      }
    });

    // Submit on Ctrl+Enter / Cmd+Enter
    thoughtEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
        submitBtn.click();
      }
    });
  </script>
</body>
</html>
