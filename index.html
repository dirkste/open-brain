<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Open Brain</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 24px;
    }

    #app { width: 100%; max-width: 480px; }

    textarea {
      width: 100%;
      min-height: 160px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      color: #f0f0f0;
      font-size: 1rem;
      line-height: 1.6;
      padding: 16px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #555; }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 16px;
      background: #f0f0f0;
      color: #0f0f0f;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:disabled { opacity: 0.4; cursor: default; }

    #status, #setup-status, #search-status, #ask-status {
      margin-top: 12px;
      font-size: 0.875rem;
      text-align: center;
      min-height: 20px;
      color: #888;
    }

    #status.ok, #setup-status.ok, #search-status.ok { color: #4ade80; }
    #status.err, #setup-status.err, #search-status.err, #ask-status.err { color: #f87171; }

    #ask-answer {
      margin-top: 16px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 16px;
      font-size: 0.9rem;
      line-height: 1.6;
      color: #f0f0f0;
      white-space: pre-wrap;
      display: none;
    }

    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }

    .tab {
      flex: 1;
      width: auto;
      margin-top: 0;
      padding: 10px;
      background: transparent;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #555;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab.active { color: #f0f0f0; border-color: #555; }

    .search-input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      color: #f0f0f0;
      font-size: 0.9rem;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: #555; }

    #results { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }

    .result-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px 16px;
    }

    .result-content {
      font-size: 0.9rem;
      line-height: 1.5;
      color: #f0f0f0;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .result-meta {
      font-size: 0.75rem;
      color: #666;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .result-type { color: #888; font-weight: 600; }

    /* Setup screen */
    #version {
      margin-top: 20px;
      font-size: 0.75rem;
      color: #333;
      text-align: center;
    }

    #setup { display: none; width: 100%; max-width: 480px; }
    #setup p { color: #888; font-size: 0.9rem; margin-bottom: 12px; }
    #setup input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      color: #f0f0f0;
      font-size: 0.9rem;
      padding: 14px 16px;
      outline: none;
    }
    #setup input:focus { border-color: #555; }
  </style>
</head>
<body>
  <h1>open brain</h1>

  <div id="version"></div>

  <div id="setup">
    <p>Enter your brain key to get started:</p>
    <input type="password" id="keyInput" placeholder="brain key" autocomplete="off" />
    <button id="saveKey">Save</button>
    <div id="setup-status"></div>
  </div>

  <div id="app" style="display:none">
    <div class="tabs">
      <button class="tab active" id="tab-capture">Capture</button>
      <button class="tab" id="tab-search">Search</button>
      <button class="tab" id="tab-ask">Ask</button>
    </div>

    <div id="capture-view">
      <textarea id="thought" placeholder="What's on your mind?" autofocus></textarea>
      <button id="submit">Capture</button>
      <div id="status"></div>
    </div>

    <div id="search-view" style="display:none">
      <input type="text" id="search-input" class="search-input" placeholder="Search your thoughts..." />
      <button id="search-btn">Search</button>
      <div id="search-status"></div>
      <div id="results"></div>
    </div>

    <div id="ask-view" style="display:none">
      <input type="text" id="ask-input" class="search-input" placeholder="Ask your brain a question..." />
      <button id="ask-btn">Ask</button>
      <div id="ask-status"></div>
      <div id="ask-answer"></div>
    </div>
  </div>

  <script>
    // === CONFIG ===
    const SUPABASE_URL = "https://ptitndzqwctzbclborxd.supabase.co";
    // ==============

    const BASE = `${SUPABASE_URL}/functions/v1/open-brain-mcp`;
    const ENDPOINT = BASE + "/capture";
    const HEALTH = BASE + "/health";
    const KEY_STORAGE = "brain_key";

    const setupEl = document.getElementById("setup");
    const appEl = document.getElementById("app");

    function showApp() {
      setupEl.style.display = "none";
      appEl.style.display = "block";
      document.getElementById("thought").focus();
    }

    function showSetup() {
      appEl.style.display = "none";
      setupEl.style.display = "block";
    }

    // Boot — validate stored key against server before showing capture screen
    async function boot() {
      const key = localStorage.getItem(KEY_STORAGE);
      if (!key) { showSetup(); return; }

      const res = await fetch(HEALTH, { headers: { "x-brain-key": key } }).catch(() => null);
      if (res?.status === 200) {
        const data = await res.json().catch(() => ({}));
        if (data.version) document.getElementById("version").textContent = "v" + data.version;
        showApp();
      } else {
        localStorage.removeItem(KEY_STORAGE);
        showSetup();
      }
    }

    boot();

    // Save key — validate against server before storing
    const saveKeyBtn = document.getElementById("saveKey");
    const setupStatus = setupEl.querySelector("#setup-status");

    document.getElementById("saveKey").addEventListener("click", async () => {
      const key = document.getElementById("keyInput").value.trim();
      if (!key) return;

      saveKeyBtn.disabled = true;
      setupStatus.className = "";
      setupStatus.textContent = "Checking key...";

      try {
        const res = await fetch(HEALTH, {
          headers: { "x-brain-key": key },
        });

        if (res.status === 200) {
          localStorage.setItem(KEY_STORAGE, key);
          showApp();
        } else if (res.status === 401) {
          setupStatus.className = "err";
          setupStatus.textContent = "Invalid key — try again.";
        } else {
          setupStatus.className = "err";
          setupStatus.textContent = `Unexpected error (${res.status}) — try again.`;
        }
      } catch (_err) {
        setupStatus.className = "err";
        setupStatus.textContent = "Could not reach server.";
      } finally {
        saveKeyBtn.disabled = false;
      }
    });

    // Submit thought
    const submitBtn = document.getElementById("submit");
    const thoughtEl = document.getElementById("thought");
    const statusEl = appEl.querySelector("#status");

    submitBtn.addEventListener("click", async () => {
      const content = thoughtEl.value.trim();
      if (!content) return;

      submitBtn.disabled = true;
      statusEl.className = "";
      statusEl.textContent = "Capturing...";

      try {
        const res = await fetch(ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-brain-key": localStorage.getItem(KEY_STORAGE),
          },
          body: JSON.stringify({ content }),
        });

        if (res.status === 401) {
          localStorage.removeItem(KEY_STORAGE);
          showSetup();
          return;
        }

        if (!res.ok) {
          const { error } = await res.json().catch(() => ({}));
          throw new Error(typeof error === 'string' ? error : `HTTP ${res.status}`);
        }

        const { metadata } = await res.json();
        const type = metadata?.type || "thought";
        const topics = metadata?.topics?.join(", ");
        statusEl.className = "ok";
        statusEl.textContent = `Captured as ${type}${topics ? " — " + topics : ""}`;
        thoughtEl.value = "";
      } catch (err) {
        statusEl.className = "err";
        statusEl.textContent = err.message;
      } finally {
        submitBtn.disabled = false;
      }
    });

    // Submit on Ctrl+Enter / Cmd+Enter
    thoughtEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
        submitBtn.click();
      }
    });

    // Tab switching
    const tabCaptureBtn = document.getElementById("tab-capture");
    const tabSearchBtn  = document.getElementById("tab-search");
    const tabAskBtn     = document.getElementById("tab-ask");
    const captureView   = document.getElementById("capture-view");
    const searchView    = document.getElementById("search-view");
    const askView       = document.getElementById("ask-view");

    function activateTab(active, views) {
      [tabCaptureBtn, tabSearchBtn, tabAskBtn].forEach(t => t.classList.remove("active"));
      active.classList.add("active");
      [captureView, searchView, askView].forEach(v => v.style.display = "none");
      views.forEach(v => v.style.display = "block");
    }

    tabCaptureBtn.addEventListener("click", () => {
      activateTab(tabCaptureBtn, [captureView]);
    });

    tabSearchBtn.addEventListener("click", () => {
      activateTab(tabSearchBtn, [searchView]);
      document.getElementById("search-input").focus();
    });

    tabAskBtn.addEventListener("click", () => {
      activateTab(tabAskBtn, [askView]);
      document.getElementById("ask-input").focus();
    });

    // Search
    const SEARCH_ENDPOINT = BASE + "/search";
    const searchBtn    = document.getElementById("search-btn");
    const searchInput  = document.getElementById("search-input");
    const searchStatus = document.getElementById("search-status");
    const resultsEl    = document.getElementById("results");

    function relativeDate(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1)  return "just now";
      if (mins < 60) return mins + "m ago";
      const hrs = Math.floor(mins / 60);
      if (hrs < 24)  return hrs + "h ago";
      return Math.floor(hrs / 24) + "d ago";
    }

    function renderResults(results) {
      resultsEl.innerHTML = "";
      if (!results.length) {
        searchStatus.className = "";
        searchStatus.textContent = "No matching thoughts found.";
        return;
      }
      searchStatus.textContent = "";
      results.forEach(function(r) {
        const m = r.metadata || {};
        const topics = Array.isArray(m.topics) ? m.topics.join(", ") : "";
        const sim = r.similarity ? Math.round(r.similarity * 100) + "%" : "";

        const card = document.createElement("div");
        card.className = "result-card";

        const content = document.createElement("div");
        content.className = "result-content";
        content.textContent = r.content;

        const meta = document.createElement("div");
        meta.className = "result-meta";
        const addMeta = (text, cls) => {
          if (meta.children.length) {
            const sep = document.createElement("span");
            sep.style.color = "#333";
            sep.textContent = "·";
            meta.appendChild(sep);
          }
          const s = document.createElement("span");
          if (cls) s.className = cls;
          s.textContent = text;
          meta.appendChild(s);
        };
        if (m.type) addMeta(m.type, "result-type");
        if (topics) addMeta(topics);
        addMeta(relativeDate(r.created_at));
        if (sim)    addMeta(sim);

        card.appendChild(content);
        card.appendChild(meta);
        resultsEl.appendChild(card);
      });
    }

    async function doSearch() {
      const query = searchInput.value.trim();
      if (!query) return;

      searchBtn.disabled = true;
      searchStatus.className = "";
      searchStatus.textContent = "Searching...";
      resultsEl.innerHTML = "";

      try {
        const res = await fetch(SEARCH_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-brain-key": localStorage.getItem(KEY_STORAGE),
          },
          body: JSON.stringify({ query }),
        });

        if (res.status === 401) {
          localStorage.removeItem(KEY_STORAGE);
          showSetup();
          return;
        }

        if (!res.ok) {
          const { error } = await res.json().catch(() => ({}));
          throw new Error(typeof error === 'string' ? error : "HTTP " + res.status);
        }

        const { results } = await res.json();
        renderResults(results);
      } catch (err) {
        searchStatus.className = "err";
        searchStatus.textContent = err.message;
      } finally {
        searchBtn.disabled = false;
      }
    }

    searchBtn.addEventListener("click", doSearch);
    searchInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") doSearch();
    });

    // Ask
    const ASK_ENDPOINT = BASE + "/ask";
    const askBtn    = document.getElementById("ask-btn");
    const askInput  = document.getElementById("ask-input");
    const askStatus = document.getElementById("ask-status");
    const askAnswer = document.getElementById("ask-answer");

    async function doAsk() {
      const question = askInput.value.trim();
      if (!question) return;

      askBtn.disabled = true;
      askStatus.className = "";
      askStatus.textContent = "Thinking...";
      askAnswer.style.display = "none";
      askAnswer.textContent = "";

      try {
        const res = await fetch(ASK_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-brain-key": localStorage.getItem(KEY_STORAGE),
          },
          body: JSON.stringify({ question }),
        });

        if (res.status === 401) {
          localStorage.removeItem(KEY_STORAGE);
          showSetup();
          return;
        }

        if (!res.ok) {
          const { error } = await res.json().catch(() => ({}));
          throw new Error(typeof error === 'string' ? error : "HTTP " + res.status);
        }

        const { answer } = await res.json();
        askStatus.textContent = "";
        askAnswer.textContent = answer;
        askAnswer.style.display = "block";
      } catch (err) {
        askStatus.className = "err";
        askStatus.textContent = err.message;
      } finally {
        askBtn.disabled = false;
      }
    }

    askBtn.addEventListener("click", doAsk);
    askInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") doAsk();
    });
  </script>
</body>
</html>
